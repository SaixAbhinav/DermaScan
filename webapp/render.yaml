# Render.com blueprint. Deploy with: New + > Blueprint, point it at this repo.
# rootDir is relative to the repo root on GitHub (SaixAbhinav/DermaScan), where
# webapp/ already sits at the top level -- NOT the local folder name on disk.
services:
  - type: web
    name: dermascan
    runtime: python
    rootDir: webapp
    plan: free               # 512MB RAM is tight for TensorFlow; bump to `starter` if it OOMs
    buildCommand: pip install -r requirements.txt
    # MODEL_URL (optional): a direct-download URL to model.keras. If set and the
    # model is missing, it is fetched at startup. Otherwise commit it via git-LFS.
    startCommand: python fetch_model.py && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: MODEL_URL
        sync: false          # set in the Render dashboard if using URL download
